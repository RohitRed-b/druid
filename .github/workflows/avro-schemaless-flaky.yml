name: Flaky Avro Schemaless (NonDex demo)

on:
  workflow_dispatch: {}   # enables the “Run workflow” button

jobs:
  nondex-demo:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Print Java & Maven
        run: |
          java -version
          mvn -v

      - name: Build (skip tests & heavy plugins)
        run: |
          mvn -q -pl extensions-core/avro-extensions -am clean install \
            -DskipTests \
            -Drat.skip=true -Dlicense.skip=true -Dcheckstyle.skip \
            -Denforcer.skip=true -Dspotbugs.skip=true -DskipITs \
            -Dmaven.remote.resources.skip=true

      - name: Run regular test (should PASS)
        id: regular
        run: |
          set -eux
          mvn -q -pl extensions-core/avro-extensions \
            -Dtest="org.apache.druid.data.input.AvroStreamInputFormatTest#testParseSchemaless" \
            -Dmaven.remote.resources.skip=true -Djacoco.skip=true -DargLine='' \
            test | tee regular.log

      - name: Run NonDex (should FAIL)
        id: nondex
        run: |
          set -eux
          mvn -q -pl extensions-core/avro-extensions \
            edu.illinois:nondex-maven-plugin:2.1.1:nondex \
            -Dtest="org.apache.druid.data.input.AvroStreamInputFormatTest#testParseSchemaless" \
            -DnondexRuns=10 \
            -Dmaven.remote.resources.skip=true -Djacoco.skip=true -DargLine='' \
            | tee nondex.log
        continue-on-error: true

      - name: Combine logs
        run: |
          cat regular.log nondex.log > ci-build.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: |
            regular.log
            nondex.log
            ci-build.log

      - name: Upload NonDex report (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nondex-report
          path: extensions-core/avro-extensions/.nondex/**
